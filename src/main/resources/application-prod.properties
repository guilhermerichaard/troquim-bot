# Configuração do profile prod (persistente)
# Ativado com: -Dspring.profiles.active=prod ou spring.profiles.active=prod

# Banco H2 em arquivo (persistente)
spring.datasource.url=jdbc:h2:file:~/troquimdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===========================================
# Evolution API Configuration
# ===========================================
evolution.api.base-url=http://localhost:8082
evolution.api.instance-name=troquim-dev
evolution.api.api-key=troquim237
