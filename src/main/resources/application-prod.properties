# ===========================================
# Profile: prod
# Configuração para produção (banco persistente)
# Ativar com: -Dspring.profiles.active=prod
# ou SPRING_PROFILES_ACTIVE=prod
# ===========================================

# Banco H2 em arquivo (persistente)
spring.datasource.url=jdbc:h2:file:~/troquimdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — update preserva dados entre restarts
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===========================================
# Evolution API — via variáveis de ambiente
# ===========================================
evolution.api.base-url=${EVOLUTION_BASE_URL:http://localhost:8082}
evolution.api.instance-name=${EVOLUTION_INSTANCE_NAME:troquim-dev}
evolution.api.api-key=${EVOLUTION_API_KEY:troquim237}