# ===========================================
# Profile: pilot
# Configuração para o piloto com primeiro cliente
# Ativar com: -Dspring.profiles.active=pilot
# ou SPRING_PROFILES_ACTIVE=pilot
# ===========================================

# Tenant do piloto: valor local explícito (profile H2 local; a base não tem default).
troquim.tenant.pilot-business-id=11111111-1111-1111-1111-111111111111

# Banco H2 em arquivo (dados persistem entre restarts)
spring.datasource.url=jdbc:h2:file:~/troquimdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — update para preservar dados entre restarts
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (acessível em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===========================================
# Evolution API — via variáveis de ambiente
# ===========================================
evolution.api.base-url=${EVOLUTION_BASE_URL:http://localhost:8082}
evolution.api.instance-name=${EVOLUTION_INSTANCE_NAME:troquim-dev}
evolution.api.api-key=${EVOLUTION_API_KEY:}
