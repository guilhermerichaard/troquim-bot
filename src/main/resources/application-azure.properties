# ===========================================
# Profile: azure
# PostgreSQL para o piloto no Azure Container Apps.
# Ativar com: SPRING_PROFILES_ACTIVE=azure
#
# Datasource vem 100% por variáveis de ambiente, usando o binding nativo
# do Spring (não usamos DATABASE_URL genérica):
#   SPRING_DATASOURCE_URL       (ex: jdbc:postgresql://host:5432/troquimdb)
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
# ===========================================

# Tenant do piloto OBRIGATÓRIO em produção: sem default. Variável TROQUIM_PILOT_BUSINESS_ID
# ausente → placeholder não resolve → startup falha. UUID inválido → bind tipado falha.
troquim.tenant.pilot-business-id=${TROQUIM_PILOT_BUSINESS_ID}

# Chave administrativa OBRIGATÓRIA no Azure: sem default; ausência impede o startup.
troquim.admin.api-key=${TROQUIM_ADMIN_API_KEY}

# Driver PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Flyway é a ÚNICA autoridade do schema; Hibernate apenas VALIDA (não altera).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway ligado no PostgreSQL: aplica db/migration antes do Hibernate validar.
spring.flyway.enabled=true
# Adoção do Flyway em banco legado (tabelas criadas por ddl-auto, SEM
# flyway_schema_history) é uma operação EXPLÍCITA de primeiro deploy:
#   - Funcionamento normal: TROQUIM_FLYWAY_BASELINE_ON_MIGRATE ausente → false.
#     Banco vazio (Testcontainers) roda V1→V2; banco legado sem history FALHA
#     (fail-fast) em vez de mascarar a adoção inicial.
#   - Primeira migração do legado: TROQUIM_FLYWAY_BASELINE_ON_MIGRATE=true.
#     Só então o Flyway marca o schema existente como baseline e aplica V2.
# baseline-version=1: o baseline marca a V1 (schema existente) como já aplicada,
#   então o Flyway aplica APENAS migrations > 1 (V2). V1 NÃO é reexecutada sobre
#   as tabelas legadas (era a causa do "relation customers already exists" com
#   baseline-version=0, que rodava V1 por cima do schema já existente).
#   Em banco vazio o baseline não dispara (schema vazio) e V1→V2 rodam normalmente.
spring.flyway.baseline-on-migrate=${TROQUIM_FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=1

# H2 console desativado
spring.h2.console.enabled=false

# Actuator: apenas health exposto e ativo
management.endpoints.web.exposure.include=health
management.endpoint.health.enabled=true
