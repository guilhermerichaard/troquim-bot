# ===========================================
# Profile: azure
# PostgreSQL para o piloto no Azure Container Apps.
# Ativar com: SPRING_PROFILES_ACTIVE=azure
#
# Datasource vem 100% por variáveis de ambiente, usando o binding nativo
# do Spring (não usamos DATABASE_URL genérica):
#   SPRING_DATASOURCE_URL       (ex: jdbc:postgresql://host:5432/troquimdb)
#   SPRING_DATASOURCE_USERNAME
#   SPRING_DATASOURCE_PASSWORD
# ===========================================

# Driver PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate — PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ddl-auto=update APENAS para o piloto — substituir por validate + migrations depois
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 console desativado
spring.h2.console.enabled=false

# Actuator: apenas health exposto e ativo
management.endpoints.web.exposure.include=health
management.endpoint.health.enabled=true
