spring.application.name=troquim-bot

# Modo de conversação: STRICT_MVP = menu numerado fechado, NORMAL = fluxo livre
conversation.mode=${CONVERSATION_MODE:STRICT_MVP}

# ===========================================
# Tenant do MVP (negócio piloto) — config tipada TenantProperties (fonte única).
# A BASE NÃO define o tenant (sem literal, sem fallback): cada profile o fornece
# explicitamente — dev/test/pilot = fixture local; azure =
# ${TROQUIM_PILOT_BUSINESS_ID}, sem default (fail-fast se ausente/inválido).
# ===========================================

# Flyway é a autoridade do schema apenas onde há PostgreSQL (profile azure).
# Desligado por padrão; o profile azure liga. H2 (test/pilot) usa Hibernate.
spring.flyway.enabled=false
# Placeholder do Flyway alimentado pela propriedade tipada troquim.tenant.pilot-business-id
# (definida por profile): a migration V2 usa ${pilot_business_id}, sem UUID literal no SQL.
spring.flyway.placeholders.pilot_business_id=${troquim.tenant.pilot-business-id}

# ===========================================
# NENHUM profile é ativado por padrão.
# Os testes ativam "test" explicitamente (@ActiveProfiles("test")).
# Piloto:   SPRING_PROFILES_ACTIVE=pilot   (ou -Dspring.profiles.active=pilot)
# Produção: SPRING_PROFILES_ACTIVE=azure   (PostgreSQL; ver docker-compose.droplet.yml)
# ===========================================

# ===========================================
# Evolution API — via variáveis de ambiente
# ===========================================
evolution.api.base-url=${EVOLUTION_BASE_URL:http://localhost:8082}
evolution.api.instance-name=${EVOLUTION_INSTANCE_NAME:troquim-dev}
evolution.api.api-key=${EVOLUTION_API_KEY:}

# ===========================================
# Chave de API administrativa (Bearer token)
# ===========================================
# No Azure, a aplicação NÃO inicia sem esta chave configurada.
# Configure o valor via variável de ambiente TROQUIM_ADMIN_API_KEY.
troquim.admin.api-key=${TROQUIM_ADMIN_API_KEY:change-me}

# Somente o health check e exposto pelo Actuator.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ===========================================
# Integração oficial WhatsApp Cloud API (Meta) — configuração tipada
# (WhatsAppCloudProperties). Desligada por padrão; sem segredos aqui — apenas
# indireção por variável de ambiente. base-url tem default oficial; graph-api-version
# NÃO tem default (deve ser explícita). Validação fail-fast (azure + enabled) em
# WhatsAppCloudConfigValidator.
# ===========================================
troquim.integrations.whatsapp.cloud.enabled=${TROQUIM_WHATSAPP_CLOUD_ENABLED:false}
troquim.integrations.whatsapp.cloud.verify-token=${TROQUIM_WHATSAPP_VERIFY_TOKEN:}
troquim.integrations.whatsapp.cloud.app-secret=${TROQUIM_WHATSAPP_APP_SECRET:}
troquim.integrations.whatsapp.cloud.access-token=${TROQUIM_WHATSAPP_ACCESS_TOKEN:}
troquim.integrations.whatsapp.cloud.phone-number-id=${TROQUIM_WHATSAPP_PHONE_NUMBER_ID:}
troquim.integrations.whatsapp.cloud.waba-id=${TROQUIM_WHATSAPP_WABA_ID:}
troquim.integrations.whatsapp.cloud.graph-api-version=${TROQUIM_WHATSAPP_GRAPH_API_VERSION:}
troquim.integrations.whatsapp.cloud.base-url=${TROQUIM_WHATSAPP_GRAPH_API_BASE_URL:https://graph.facebook.com}

# ===========================================
# WhatsApp Flow (Meta) — Data Endpoint de agendamento.
# Desligado por padrão; sem segredos aqui — apenas indireção por variável de
# ambiente. A chave privada RSA (PEM PKCS#8) NUNCA é versionada: vem de
# WHATSAPP_FLOW_PRIVATE_KEY. Ligado, a aplicação falha rápido se a chave for
# ausente ou ilegível (FlowPrivateKeyProvider).
# ===========================================
troquim.integrations.whatsapp.flow.enabled=${TROQUIM_WHATSAPP_FLOW_ENABLED:false}
troquim.integrations.whatsapp.flow.private-key=${WHATSAPP_FLOW_PRIVATE_KEY:}
troquim.integrations.whatsapp.flow.private-key-password=${WHATSAPP_FLOW_PRIVATE_KEY_PASSWORD:}
troquim.integrations.whatsapp.flow.janela-dias=${TROQUIM_WHATSAPP_FLOW_JANELA_DIAS:30}
# Identificacao do Flow publicado na Meta. Sem flow-id nem flow-name, a abertura da
# agenda por Flow fica INDISPONIVEL e a conversa cai no menu textual (degradacao
# explicita, nao erro).
troquim.integrations.whatsapp.flow.flow-id=${TROQUIM_WHATSAPP_FLOW_ID:}
troquim.integrations.whatsapp.flow.flow-name=${TROQUIM_WHATSAPP_FLOW_NAME:}
# Rotulo do botao (limite da Meta: 20 caracteres) e texto que o acompanha.
troquim.integrations.whatsapp.flow.cta=${TROQUIM_WHATSAPP_FLOW_CTA:Abrir agenda}
# "draft" so' funciona para quem tem acesso ao app da Meta; producao usa published.
troquim.integrations.whatsapp.flow.modo-rascunho=${TROQUIM_WHATSAPP_FLOW_DRAFT:false}
# TTL da sessao, em minutos. Curto o bastante para limitar a janela de um token vazado.
troquim.integrations.whatsapp.flow.sessao-ttl-minutos=${TROQUIM_WHATSAPP_FLOW_SESSAO_TTL_MIN:30}
