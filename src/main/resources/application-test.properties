# Configuração do profile test (para testes de persistência)
# Banco H2 em memória — tudo é descartado após cada teste

spring.datasource.url=jdbc:h2:mem:troquimdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.h2.console.enabled=false

# Tenant do piloto: valor explícito de fixture para testes
# (igual a TestTenants.PILOT usado pelos @SpringBootTest).
troquim.tenant.pilot-business-id=11111111-1111-1111-1111-111111111111

# Chave de API administrativa para testes
troquim.admin.api-key=test-admin-key

# Integração WhatsApp Cloud LIGADA em teste. APENAS config NÃO-secreta aqui
# (identificadores/versão/base-url). Os segredos (verify-token, app-secret,
# access-token) NÃO ficam em properties: os testes que precisam deles os injetam
# via @TestPropertySource/@DynamicPropertySource com valores fictícios. graph-api-version
# é fictícia (não presumir a versão real da Graph API); base-url aponta para destino inerte.
troquim.integrations.whatsapp.cloud.enabled=true
troquim.integrations.whatsapp.cloud.phone-number-id=test-phone-number-id
troquim.integrations.whatsapp.cloud.waba-id=test-waba-id
troquim.integrations.whatsapp.cloud.graph-api-version=vtest
troquim.integrations.whatsapp.cloud.base-url=http://localhost:59999
