# Configuração do profile test (para testes de persistência)
# Banco H2 em memória — tudo é descartado após cada teste

spring.datasource.url=jdbc:h2:mem:troquimdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.h2.console.enabled=false

# Tenant do piloto: valor explícito de fixture para testes
# (igual a TestTenants.PILOT usado pelos @SpringBootTest).
troquim.tenant.pilot-business-id=11111111-1111-1111-1111-111111111111