# Profile de desenvolvimento
# Herda do application.properties e sobrescreve conforme necessário

# H2 em memória para desenvolvimento
spring.datasource.url=jdbc:h2:mem:devdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging para debug
logging.level.com.troquim_bot=DEBUG
logging.level.org.springframework.web=DEBUG

# Evolution API (mock em dev)
evolution.api.base-url=http://localhost:8082
evolution.api.instance-name=troquim-dev
evolution.api.api-key=troquim237